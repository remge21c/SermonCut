version: "2.0"

screen:
  name: Quick Shorts - 렌더 진행 및 결과
  route: /quick/result
  layout: list-single

# 기획서 §8.2 (8): 결과 확인 (short_001~003.mp4)
description: >
  3개 쇼츠의 렌더 진행 상황을 실시간 표시하고, 완료되면 결과 MP4와
  메타데이터(제목/훅/강조문/해시태그)를 보여준다.

data_requirements:
  - resource: shorts_render
    needs: [id, title, status, progress, output_path, hashtags, hook_line, highlight]
  - resource: shorts_render
    needs: [status]
    realtime: true            # 진행률 폴링/스트리밍

components:
  - id: render_progress_list
    type: list
    position: main
    function: "3개 쇼츠별 진행률/상태 표시 (rendering/done/failed)"
    data_source: { resource: shorts_render }
    item_components: [progress_bar, status_badge]

  - id: result_card
    type: card_list
    position: main
    function: "완료된 쇼츠 카드 (썸네일, 제목, 해시태그, 파일 열기/폴더 열기)"
    visible_when: status == done
    item_components: [thumbnail, open_file_button, open_folder_button, copy_meta_button]

  - id: retry_button
    type: button
    position: bottom
    function: 실패한 쇼츠 재렌더
    visible_when: any(status == failed)

  - id: new_job_button
    type: button
    position: bottom
    function: 새 작업 시작
    events:
      - on: click
        action: navigate(/)

tests:
  - name: 렌더 진행 표시
    when: 결과 화면 진입(렌더 중)
    then: [3개 쇼츠 진행률 바 표시, 상태 실시간 갱신]
  - name: 완료 결과 표시
    when: 3개 모두 done
    then: [결과 카드 3개 표시, 파일/폴더 열기 버튼 동작, 메타데이터 표시]
  - name: 실패 재렌더
    when: 1개 쇼츠 status=failed
    then: [재렌더 버튼 표시, 클릭 시 해당 건만 재렌더]
  - name: 새 작업
    when: 새 작업 시작 클릭
    then: [홈으로 이동]
